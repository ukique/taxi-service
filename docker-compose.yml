services:
  db:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    container_name: taxi-service-db
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  broker:
    image: rabbitmq:4-management
    env_file:
      - .env
    container_name: taxi-service-rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DEFAULT_PASS}"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  taxi-service:
    build:
      context: .
      dockerfile: cmd/taxi-service/Dockerfile
    env_file:
      - .env
    container_name: taxi-service-app
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy

  taxi-simulation:
    build:
      context: .
      dockerfile: cmd/taxi-simulation/Dockerfile
    env_file:
      - .env
    container_name: taxi-simulation-app
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
      taxi-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taxi-frontend
    ports:
      - "${NGINX_PORT}:80"
    restart: on-failure
    depends_on:
      taxi-service:
        condition: service_started

volumes:
  postgres_data: